name: keepalive stop smoke
on:
  workflow_dispatch:
env:
  STOP_LISTENER_ENABLED: "true"
  STOP_FIREBASE_URL: ${{ secrets.STOP_FIREBASE_URL }}
  STOP_RUNNER_ID: ${{ github.run_id }}-${{ github.run_attempt }}
jobs:
  smoke-stop:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dotenvrtdb from npm
        run: |
          npm install -g @tltdh61/dotenvrtdb --prefer-online --no-cache
          dotenvrtdb runner set-stoprunnerid

      - name: Create short-lived docker compose stack
        run: |
          cat > docker-compose.yml <<'EOF'
          services:
            demo:
              image: alpine:3.20
              # command: ["sh", "-lc", "echo 'demo start'; sleep 3; echo 'demo done'"]
              command: ["sh", "-lc", "tail -f /dev/null"]
          EOF

      - name: Start stack
        run: docker compose -f docker-compose.yml up -d

      - name: Run keepalive and verify auto-stop
        run: |
          dotenvrtdb runner keepalive

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans
