name: keepalive stop smoke
on:
  workflow_dispatch:
env:
  STOP_LISTENER_ENABLED: "true"
  STOP_FIREBASE_URL: ${{ secrets.STOP_FIREBASE_URL }}
  STOP_RUNNER_ID: ${{ runner.name }}-${{ github.run_id }}-${{ github.run_attempt }}
jobs:
  smoke-stop:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dotenvrtdb from npm
        run: |
          npm install -g @tolaptrinhdh61/dotenvrtdb
          dotenvrtdb keepalive --stop-runner-id

      - name: Create short-lived docker compose stack
        run: |
          cat > docker-compose.keepalive-smoke.yml <<'EOF'
          services:
            demo:
              image: alpine:3.20
              command: ["sh", "-lc", "echo 'demo start'; sleep 3; echo 'demo done'"]
          EOF

      - name: Start stack
        run: docker compose -f docker-compose.keepalive-smoke.yml up -d

      - name: Run keepalive and verify auto-stop
        run: |
          set -euo pipefail

          dotenvrtdb runner keepalive \
            --interval 1 \
            --tail 20 \
            --compose-file docker-compose.keepalive-smoke.yml \
            --label "[gha-smoke]" \
            > keepalive.log 2>&1

          cat keepalive.log

          grep -q "All containers have stopped. Exiting." keepalive.log

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.keepalive-smoke.yml down -v --remove-orphans
