      # - name: Assert keepalive stops quickly
      #   run: |
      #     deadline=$((SECONDS + 20))
      #     while [ ! -f keepalive.exitcode ] && [ $SECONDS -lt $deadline ]; do
      #       sleep 1
      #     done

      #     echo '--- keepalive.log ---'
      #     test -f keepalive.log && cat keepalive.log || true

      #     if [ ! -f keepalive.exitcode ]; then
      #       echo 'keepalive did not stop within 20 seconds'
      #       exit 1
      #     fi

      #     exit_code="$(cat keepalive.exitcode)"
      #     echo "keepalive exit code=${exit_code}"
      #     test "${exit_code}" = "130"
      #     grep -E 'Stop requested\.|Aborting in-flight docker command\.|source=(poll|sse)' keepalive.log

      - name: Cleanup
        if: ${{ always() }}
        run: docker compose -f docker-compose.yml down -v --remove-orphans
